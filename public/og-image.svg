  <text x="240" y="470" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#e8f0fe">11</text>
  <text x="240" y="500" font-family="Arial, sans-serif" font-size="14" fill="#7a9cc5">Projects</text>

  <text x="340" y="470" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#e8f0fe">4x</text>
