  <text x="858" y="250" font-family="monospace" font-size="13" fill="#4ade80"> "Node.js + TS",</text>
  <text x="800" y="275" font-family="monospace" font-size="13" fill="#7a9cc5">  db:</text>
  <text x="835" y="275" font-family="monospace" font-size="13" fill="#4ade80">     "PostgreSQL",</text>
  <text x="800" y="300" font-family="monospace" font-size="13" fill="#7a9cc5">  cloud:</text>
  <text x="852" y="300" font-family="monospace" font-size="13" fill="#4ade80">  "AWS",</text>
  <text x="800" y="325" font-family="monospace" font-size="13" fill="#7a9cc5">  ai:</text>
