  <text x="800" y="350" font-family="monospace" font-size="13" fill="#7a9cc5">  yoe:</text>
  <text x="836" y="350" font-family="monospace" font-size="13" fill="#fb923c">     5,</text>
  <text x="800" y="375" font-family="monospace" font-size="13" fill="#e8f0fe">{"}"}</text>
  <text x="800" y="400" font-family="monospace" font-size="13" fill="#e8f0fe">{"}"}</text>
